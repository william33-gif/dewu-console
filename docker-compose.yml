version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: dewu-console-postgres
    environment:
      POSTGRES_DB: dewu_console
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  postgres_data:
